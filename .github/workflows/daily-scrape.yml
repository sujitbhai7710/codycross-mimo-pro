name: Daily CodyCross Answers Update

on:
  schedule:
    # Run at 08:00 UTC daily (when the game updates its puzzles)
    - cron: '0 8 * * *'
    # Also run every 30 minutes as backup for timing accuracy
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to fetch (YYYY-MM-DD, defaults to today)'
        required: false
      mode:
        description: 'Run mode: explore, auth, fetch, or all'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  fetch-answers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run game auth + fetch answers
        env:
          DATE_OVERRIDE: ${{ github.event.inputs.date || '' }}
          RUN_MODE: ${{ github.event.inputs.mode || 'all' }}
        run: npx tsx scripts/game-auth.ts fetch --date "${DATE_OVERRIDE:-}" 2>&1 || true

      - name: Run web scraper (fallback for daily answers)
        run: npx tsx scripts/scrape-daily.ts "${DATE_OVERRIDE:-today}" 2>&1 || true

      - name: Commit updated answers
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --cached --quiet || echo "No changes to commit"
          git commit -m "🔄 Auto-update: daily CodyCross answers $(date +%Y-%m-%d)" || echo "Nothing to push"
          git push || echo "Push failed (may need workflow scope token)"

      - name: Build check
        run: npm run build 2>&1 | tail -5
