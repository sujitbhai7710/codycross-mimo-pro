name: Daily CodyCross Scrape

on:
  schedule:
    # Run daily at 00:05 UTC
    - cron: '5 0 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to scrape (YYYY-MM-DD, "yesterday", or leave empty for today)'
        required: false
        default: ''

jobs:
  scrape:
    name: Scrape Daily Answers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            npx tsx scripts/scrape-daily.ts "${{ github.event.inputs.date }}"
          else
            npx tsx scripts/scrape-daily.ts
          fi
        env:
          NODE_ENV: production

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet data/daily-answers.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated data
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/daily-answers.json
          git commit -m "chore: update daily answers for $(date +%Y-%m-%d)"
          git push

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: scrape
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build
